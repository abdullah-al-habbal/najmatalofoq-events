info:
  name: Register a new user
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "name": "string",
        "email": "user@example.com",
        "password": "stringPassword"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://127.0.0.1:8000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "email": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
