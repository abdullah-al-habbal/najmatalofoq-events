  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/logout"
  auth:
    type: bearer
    token: 2|G8EFNqScPCmvE2vc41jxPxZZreCYKZcOz0YPVDB76bff7ff6

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
