info:
  name: Update an existing event
  type: http
  seq: 5
  tags:
    - Events

http:
  method: PUT
  url: "{{baseUrl}}/events/dashboard/:uuid"
  params:
    - name: uuid
      value: ""
      type: path
      description: Event UUID
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "start_date": "",
        "end_date": "",
        "latitude": {},
        "longitude": {},
        "geofence_radius": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/events/dashboard/:uuid"
      method: PUT
      params:
        - name: uuid
          value: ""
          type: path
          description: Event UUID
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "start_date": "",
            "end_date": "",
            "latitude": {},
            "longitude": {},
            "geofence_radius": 0
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthenticated
    request:
      url: "{{baseUrl}}/events/dashboard/:uuid"
      method: PUT
      params:
        - name: uuid
          value: ""
          type: path
          description: Event UUID
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "start_date": "",
            "end_date": "",
            "latitude": {},
            "longitude": {},
            "geofence_radius": 0
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
