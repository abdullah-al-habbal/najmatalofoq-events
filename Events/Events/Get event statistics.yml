info:
  name: Get event statistics
  type: http
  seq: 1
  tags:
    - Events

http:
  method: GET
  url: "{{baseUrl}}/events/dashboard/stats"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/events/dashboard/stats"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthenticated
    request:
      url: "{{baseUrl}}/events/dashboard/stats"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
