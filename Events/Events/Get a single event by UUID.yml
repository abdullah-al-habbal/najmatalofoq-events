info:
  name: Get a single event by UUID
  type: http
  seq: 4
  tags:
    - Events

http:
  method: GET
  url: "{{baseUrl}}/events/dashboard/:uuid"
  params:
    - name: uuid
      value: ""
      type: path
      description: Event UUID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/events/dashboard/:uuid"
      method: GET
      params:
        - name: uuid
          value: ""
          type: path
          description: Event UUID
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthenticated
    request:
      url: "{{baseUrl}}/events/dashboard/:uuid"
      method: GET
      params:
        - name: uuid
          value: ""
          type: path
          description: Event UUID
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
