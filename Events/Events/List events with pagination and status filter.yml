info:
  name: List events with pagination and status filter
  type: http
  seq: 2
  tags:
    - Events

http:
  method: GET
  url: "{{baseUrl}}/events/dashboard"
  params:
    - name: page
      value: "1"
      type: query
      description: Page number
    - name: per_page
      value: "15"
      type: query
      description: Items per page
    - name: status
      value: ""
      type: query
      description: Filter by status (comma‑separated, e.g. draft,published)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/events/dashboard"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
          description: Page number
        - name: per_page
          value: "15"
          type: query
          description: Items per page
        - name: status
          value: ""
          type: query
          description: Filter by status (comma‑separated, e.g. draft,published)
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthenticated
    request:
      url: "{{baseUrl}}/events/dashboard"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
          description: Page number
        - name: per_page
          value: "15"
          type: query
          description: Items per page
        - name: status
          value: ""
          type: query
          description: Filter by status (comma‑separated, e.g. draft,published)
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
