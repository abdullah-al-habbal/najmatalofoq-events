info:
  name: Create a new event
  type: http
  seq: 3
  tags:
    - Events

http:
  method: POST
  url: "{{baseUrl}}/events/dashboard"
  body:
    type: json
    data: |-
      {
        "name": "Annual Conference",
        "description": "Company-wide annual conference with workshops",
        "start_date": "2026-04-15T09:00:00Z",
        "end_date": "2026-04-17T18:00:00Z",
        "latitude": 40.7128,
        "longitude": -74.0060,
        "geofence_radius": 500
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/events/dashboard"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "start_date": "",
            "end_date": "",
            "latitude": {},
            "longitude": {},
            "geofence_radius": 0
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthenticated
    request:
      url: "{{baseUrl}}/events/dashboard"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "start_date": "",
            "end_date": "",
            "latitude": {},
            "longitude": {},
            "geofence_radius": 0
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
